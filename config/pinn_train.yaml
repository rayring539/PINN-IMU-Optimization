# =============================================================================
#  PINN 训练配置（PyTorch: train_pinn.py / DeepXDE: train_pinn_dde.py）
#  用法:
#    python train_pinn_dde.py --config config/pinn_train.yaml
#    python train_pinn.py --config config/pinn_train.yaml
#  CLI 可覆盖同名字段，例如: --epochs 100 --gpus 0,1,2,3
# =============================================================================

# ---- 数据 ----
data:
  # Linux/macOS 示例: "./data" 或 "/home/you/IMU_data"；Windows 可用 "D:\\IMU_data"
  data_dir: "/home/leiyilin/IMU_data"
  # 与 data_dir 二选一: 单文件时用下面一行并注释掉 data_dir
  # data_path: "data/1.txt"
  N_used: -1                       # -1 = 每个文件读全量；>0 时训练集累计上限（每文件截断）
  test_ratio: 0.2                  # 仅 split_mode: random 且走「单文件+分层划分」时有效
  seed: 0                          # split_mode: random 时随机选测试文件用

  # 划分方式:
  #   explicit — 使用 train_files / test_files（默认 1–4 训练，5 测试）
  #   random   — 多 .txt 中随机留一个作测试，其余训练
  split_mode: explicit
  train_files: ["1.txt", "2.txt", "3.txt", "4.txt"]
  test_files: ["5.txt"]

# ---- 传感器标度（寄存器 → 物理量）----
#  7 列: [acc×3, gyro×3, temp]
#  加速度 g = raw / acc_scale；角速度 °/s = raw / gyro_scale；温度 ℃ = raw / temp_scale
sensor:
  acc_scale: 2048.0
  gyro_scale: 16.0
  temp_scale: 256.0

# ---- 网络 ----
model:
  hidden_dim: 32              # 残差分支宽度（边缘可 32，服务器可 64）
  n_hidden: 3                 # 残差分支层数
  thermal_dim: 16             # 热特征维度
  act: "tanh"
  use_dTdt: true               # 输入是否含 Tdot（8 维）；false 为 7 维
  use_hysteresis: true
  hysteresis_hidden: 16
  # false: 残差分支使用 raw6（与当前默认一致）
  # true:  仅依赖温度(及 Ṫ)；残差输入中 raw6_norm 置零，需单独训练/部署，权重与 false 不通用
  temp_only: false

# ---- 训练（DeepXDE / PyTorch 共用字段）----
training:
  epochs: 100
  # 须为整数；勿写如 2048*10 这样的表达式（YAML 会当成字符串）。
  batch_size: 10240
  # 学习率：若 val/data、val/bad_* 剧烈震荡，可先减半再试（如 2.5e-5）
  lr: 5.0e-5
  weight_decay: 1.0e-5
  grad_clip: 5.0               # 仅 train_pinn.py 使用
  log_interval: 1             # 每隔多少个 epoch 打印/写 TensorBoard（按 iter 折算）
  # 物理损失 warmup：等效 epoch 数越大，物理项从 0 拉满越慢，越不易与数据项「对撞」引发振荡
  physics_warmup: 60
  # 验证指标 bad_any_rate：任一分量 |δ_pred-δ_true| 超过该阈值 (LSB) 的样本比例；与 eval_pinn --bad_x 一致
  val_bad_threshold: 5.0

  # Adam 之后的 L-BFGS 精调迭代数（0 = 关闭）；仅 train_pinn_dde.py
  lbfgs_iters: 500

  # 设备: gpu_ids 多于 1 个且 CUDA 可用时启用 DataParallel（主卡为 gpu_ids[0]）
  # 单卡示例: [0] ；四卡示例: [0, 1, 2, 3]
  gpu_ids: [1]
  # 未配置 gpu_ids 时使用的单卡索引（或与 gpu_ids: [k] 等价）
  cuda_device: 1
  # true = 强制 CPU（调试用）；也可用 CLI: --cpu
  force_cpu: false
  # DeepXDE 内置混合精度 (AMP)
  mixed_precision: false

# ---- 物理损失权重 λ（相对数据项权重 1.0）----
# 若 TensorBoard 中 val/data 尖峰多：先整体减半再训；仍抖再略降 L_physics_prior
physics_loss:
  L_heat_smooth: 5.0e-3
  L_physics_prior: 5.0e-2
  L_stiffness_mono: 5.0e-3
  L_acc_tdb: 5.0e-3
  L_three_factor: 5.0e-3
  L_gyro_smooth: 5.0e-3
  L_residual_small: 5.0e-4
  L_grad_smooth: 5.0e-4

# ---- 可学习物理参数先验（文档用；反演权重在 physics_loss）----
physics_priors:
  k_E_ppm: 60.0
  alpha_ppm: 2.6
  delta_alpha_ppm: 5.0

# ---- 输出目录（checkpoint / TensorBoard / ONNX / split json）----
output:
  out_dir: "outputs_pinn"
